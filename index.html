<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projetos</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <div class="hero-content">

    <div class="avatar">🧑‍💻</div>

    <h1>Projetos</h1>

    <p class="subtitulo">
      Desenvolvimento Web • Atividades do Semestre
    </p>

    <div class="badges">
      <span>📚 Atividades</span>
      <span>💻 HTML & CSS</span>
      <span>🚀 Web Dev</span>
    </div>

  </div>
</header>

<main>

  <section class="sobre">
    <h2>Sobre o Projeto</h2>
    <p>
      Este portfólio reúne todas as atividades desenvolvidas durante o semestre.
    </p>
  </section>

  <section>
    <h2 class="titulo-secao">Atividades</h2>

    <div class="lista" id="lista"></div>
  </section>

</main>

<footer>
  <p>Feito por Gabriel Garcia</p>
</footer>

<script>
async function carregarAtividades() {
  const res = await fetch('atividades.json');
  const data = await res.json();

  const lista = document.getElementById('lista');

  lista.innerHTML = data.map(a => `
    <a href="atividade.html?id=${a.id}" class="card">
      <span class="numero">${a.status}</span>
      <h3>${a.titulo}</h3>
      <p>${a.data_entrega}</p>
    </a>
  `).join('');
}

carregarAtividades();
</script>

</body>
</html>
