<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projetos</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <div class="hero-content">

    <div class="avatar">🧑‍💻</div>

    <h1>Projetos</h1>

    <p class="subtitulo">
      Desenvolvimento Web • Atividades do Semestre
    </p>

    <div class="badges">
      <span>📚 Atividades</span>
      <span>💻 HTML & CSS</span>
      <span>🚀 Web Dev</span>
    </div>

  </div>
</header>

<main>

  <section class="sobre">
    <h2>Sobre o Projeto</h2>
    <p>
      Este portfólio reúne todas as atividades desenvolvidas durante o semestre.
    </p>
  </section>

  <section>
    <h2 class="titulo-secao">Atividades</h2>

    <div class="lista" id="lista"></div>
  </section>

</main>

<footer>
  <p>Feito por Gabriel Garcia</p>
</footer>

<!-- MODAL PDF -->
<div id="pdfModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closePDFModal()">&times;</span>
    <iframe id="pdfIframe" class="pdf-iframe"></iframe>
  </div>
</div>

<script>
async function carregarAtividades() {
  const res = await fetch('atividades.json');
  const data = await res.json();

  const lista = document.getElementById('lista');

  lista.innerHTML = data.map(a => {
    const statusClass = a.status === 'Concluída' ? 'concluida' : 'atividade';
    const botaoPDF = a.pdf ? `<button class="btn-pdf" onclick="openPDFModal('${a.pdf}')">📄 Ver PDF</button>` : '';
    
    return `
      <a href="atividade.html?id=${a.id}" class="card">
        <span class="numero ${statusClass}">${a.status}</span>
        <h3>${a.titulo}</h3>
        <p>${a.data_entrega}</p>
        ${botaoPDF}
      </a>
    `;
  }).join('');
}

function openPDFModal(pdfUrl) {
  const modal = document.getElementById('pdfModal');
  const iframe = document.getElementById('pdfIframe');
  iframe.src = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closePDFModal() {
  const modal = document.getElementById('pdfModal');
  modal.classList.remove('show');
  document.body.style.overflow = 'auto';
}

// Fechar modal ao clicar fora dele
document.addEventListener('click', function(event) {
  const modal = document.getElementById('pdfModal');
  if (event.target === modal) {
    closePDFModal();
  }
});

carregarAtividades();
</script>

</body>
</html>
