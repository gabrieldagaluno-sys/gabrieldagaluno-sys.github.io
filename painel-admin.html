<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Portfólio</title>
<style>
  :root{
    --bg:#121212;
    --panel:#1A1A1A;
    --line:#2C2C2C;
    --ink:#EDEAE3;
    --muted:#8C8884;
    --accent:#D5FF3F;
    --accent-dim:#A8CC32;
    --danger:#FF6B5B;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Courier New', monospace;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:48px 24px 80px;}

  /* ---- GATE (tela de token) ---- */
  #gate{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
  }
  #gate.hidden{display:none;}
  .gate-box{
    width:100%;max-width:340px;padding:0 24px;text-align:center;
  }
  .gate-box .brand{margin-bottom:28px;justify-content:center;display:flex;}
  .gate-box label{text-align:left;}
  .gate-box input{margin-bottom:10px;}
  .gate-error{
    color:var(--danger);font-size:12px;min-height:16px;margin-bottom:10px;text-align:left;
  }
  body.locked{overflow:hidden;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:20px;margin-bottom:36px;
  }
  .brand{font-family:Georgia, 'Times New Roman', serif;font-size:28px;letter-spacing:-0.5px;}
  .brand span{color:var(--accent);}
  .meta{color:var(--muted);font-size:12px;text-align:right;line-height:1.6;}

  nav{display:flex;gap:0;margin-bottom:32px;border:1px solid var(--line);width:fit-content;}
  nav button{
    background:none;border:none;color:var(--muted);
    font-family:inherit;font-size:12px;letter-spacing:1px;text-transform:uppercase;
    padding:12px 22px;cursor:pointer;border-right:1px solid var(--line);
  }
  nav button:last-child{border-right:none;}
  nav button.active{color:var(--bg);background:var(--accent);}

  .panel{display:none;}
  .panel.active{display:block;}

  .section-title{
    font-family:Georgia, serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);margin-bottom:18px;
  }

  form.card{
    background:var(--panel);border:1px solid var(--line);padding:24px;margin-bottom:32px;
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  input[type=text], input[type=url], textarea, select{
    width:100%;background:#0E0E0E;border:1px solid var(--line);color:var(--ink);
    padding:10px 12px;font-family:inherit;font-size:14px;border-radius:var(--radius);margin-bottom:14px;
  }
  textarea{resize:vertical;min-height:70px;}
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--accent);}

  .row{display:flex;gap:10px;align-items:center;}

  button.primary{
    background:var(--accent);color:#0E0E0E;border:none;
    font-family:inherit;font-weight:bold;font-size:12px;letter-spacing:1px;text-transform:uppercase;
    padding:12px 20px;cursor:pointer;border-radius:var(--radius);
  }
  button.primary:hover{background:var(--accent-dim);}
  button.ghost{
    background:none;border:1px solid var(--line);color:var(--muted);
    font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;
    padding:11px 16px;cursor:pointer;border-radius:var(--radius);
  }
  button.ghost:hover{border-color:var(--accent);color:var(--accent);}

  .item{
    border:1px solid var(--line);padding:18px;margin-bottom:12px;display:flex;justify-content:space-between;gap:16px;
    background:var(--panel);
  }
  .item-body{flex:1;}
  .item-title{font-size:16px;margin-bottom:4px;}
  .item-sub{font-size:12px;color:var(--muted);margin-bottom:8px;word-break:break-all;}
  .item-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:10px;color:var(--accent);border:1px solid var(--line);padding:2px 8px;letter-spacing:0.5px;text-transform:uppercase;}
  .item-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
  .item-actions button{font-size:10px;}

  .empty{
    border:1px dashed var(--line);padding:36px;text-align:center;color:var(--muted);font-size:13px;
  }

  .export-bar{display:flex;justify-content:space-between;align-items:center;margin-top:48px;border-top:1px solid var(--line);padding-top:20px;}
  .export-bar p{font-size:11px;color:var(--muted);margin:0;}

  .toast{
    position:fixed;bottom:28px;right:28px;background:var(--accent);color:#0E0E0E;
    padding:12px 18px;font-size:12px;font-weight:bold;letter-spacing:0.5px;
    border-radius:var(--radius);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}

  @media(max-width:640px){
    .grid2{grid-template-columns:1fr;}
    header{flex-direction:column;align-items:flex-start;gap:10px;}
    .meta{text-align:left;}
    .item{flex-direction:column;}
    .item-actions{flex-direction:row;}
  }
</style>
</head>
<body class="locked">

<div id="gate">
  <div class="gate-box">
    <div class="brand">painel<span style="color:var(--accent)">.</span></div>
    <label>Token de acesso</label>
    <input type="password" id="gate-token" placeholder="Digite o token" autocomplete="off">
    <div class="gate-error" id="gate-error"></div>
    <button type="button" class="primary" id="gate-entrar" style="width:100%;">Entrar</button>
  </div>
</div>

<div class="wrap">

  <header>
    <div class="brand">painel<span>.</span></div>
    <div class="meta">Conteúdo do seu portfólio<br>salvo neste navegador</div>
  </header>

  <nav>
    <button class="active" data-tab="projetos">Projetos</button>
    <button data-tab="links">Links</button>
  </nav>

  <!-- PROJETOS -->
  <section class="panel active" id="panel-projetos">
    <div class="section-title">Novo projeto / post</div>
    <form class="card" id="form-projeto">
      <div class="grid2">
        <div>
          <label>Título</label>
          <input type="text" id="p-titulo" required placeholder="Nome do projeto">
        </div>
        <div>
          <label>Categoria</label>
          <input type="text" id="p-categoria" placeholder="Ex: Web, Design, Escrita">
        </div>
      </div>
      <label>Descrição</label>
      <textarea id="p-descricao" placeholder="Sobre o que é esse projeto"></textarea>
      <div class="grid2">
        <div>
          <label>Link (opcional)</label>
          <input type="url" id="p-link" placeholder="https://">
        </div>
        <div>
          <label>Data</label>
          <input type="text" id="p-data" placeholder="Ex: 2026">
        </div>
      </div>
      <button type="submit" class="primary">Adicionar projeto</button>
    </form>

    <div class="section-title">Projetos cadastrados</div>
    <div id="lista-projetos"></div>
  </section>

  <!-- LINKS -->
  <section class="panel" id="panel-links">
    <div class="section-title">Novo link</div>
    <form class="card" id="form-link">
      <div class="grid2">
        <div>
          <label>Rótulo</label>
          <input type="text" id="l-label" required placeholder="Ex: GitHub, Instagram, E-mail">
        </div>
        <div>
          <label>URL</label>
          <input type="url" id="l-url" required placeholder="https://">
        </div>
      </div>
      <button type="submit" class="primary">Adicionar link</button>
    </form>

    <div class="section-title">Links cadastrados</div>
    <div id="lista-links"></div>
  </section>

  <div class="export-bar">
    <p>Dados ficam salvos neste navegador (localStorage).<br>Exporte para usar em outro lugar ou fazer backup.</p>
    <div class="row">
      <button class="ghost" id="btn-export">Exportar JSON</button>
      <button class="ghost" id="btn-import">Importar JSON</button>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== TOKEN DE ACESSO =====
// Troque este valor pelo hash SHA-256 do seu token.
// Gere o hash abrindo o console do navegador e rodando, por exemplo:
//   crypto.subtle.digest('SHA-256', new TextEncoder().encode('SEU_TOKEN_AQUI'))
//     .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
// Hash padrão abaixo corresponde ao token: "meutoken123" (TROQUE ANTES DE PUBLICAR)
const TOKEN_HASH = "d984a4ebbed84d165d697b537e3ad2db17d9810147cde484c910dd9796bc2663";
const SESSION_KEY = "painel_sessao_v1";

async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function tentarEntrar(){
  const valor = document.getElementById('gate-token').value;
  const erro = document.getElementById('gate-error');
  if(!valor){ erro.textContent = 'Digite o token.'; return; }
  const hash = await sha256(valor);
  if(hash === TOKEN_HASH){
    sessionStorage.setItem(SESSION_KEY, "1");
    liberarPainel();
  }else{
    erro.textContent = 'Token incorreto.';
  }
}

function liberarPainel(){
  document.getElementById('gate').classList.add('hidden');
  document.body.classList.remove('locked');
}

document.getElementById('gate-entrar').addEventListener('click', tentarEntrar);
document.getElementById('gate-token').addEventListener('keydown', e=>{
  if(e.key === 'Enter') tentarEntrar();
});

if(sessionStorage.getItem(SESSION_KEY) === "1"){
  liberarPainel();
}
</script>

<script>
const KEY = "painel_portfolio_v1";

function load(){
  try{
    return JSON.parse(localStorage.getItem(KEY)) || {projetos:[], links:[]};
  }catch(e){
    return {projetos:[], links:[]};
  }
}
function save(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}
let data = load();

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

// ---- TABS ----
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

// ---- PROJETOS ----
function renderProjetos(){
  const wrap = document.getElementById('lista-projetos');
  if(data.projetos.length === 0){
    wrap.innerHTML = '<div class="empty">Nenhum projeto ainda. Adicione o primeiro acima.</div>';
    return;
  }
  wrap.innerHTML = data.projetos.slice().reverse().map(p => `
    <div class="item">
      <div class="item-body">
        <div class="item-title">${escapeHtml(p.titulo)}</div>
        <div class="item-sub">${p.link ? `<a href="${escapeAttr(p.link)}" target="_blank" style="color:var(--muted)">${escapeHtml(p.link)}</a>` : 'sem link'} ${p.data ? '· '+escapeHtml(p.data) : ''}</div>
        <div style="font-size:13px;color:var(--ink);margin-bottom:8px;">${escapeHtml(p.descricao||'')}</div>
        ${p.categoria ? `<div class="item-tags"><span class="tag">${escapeHtml(p.categoria)}</span></div>` : ''}
      </div>
      <div class="item-actions">
        <button class="ghost" onclick="removerProjeto('${p.id}')">Remover</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('form-projeto').addEventListener('submit', e=>{
  e.preventDefault();
  const titulo = document.getElementById('p-titulo').value.trim();
  if(!titulo) return;
  data.projetos.push({
    id: uid(),
    titulo,
    categoria: document.getElementById('p-categoria').value.trim(),
    descricao: document.getElementById('p-descricao').value.trim(),
    link: document.getElementById('p-link').value.trim(),
    data: document.getElementById('p-data').value.trim()
  });
  save(data);
  e.target.reset();
  renderProjetos();
  toast('Projeto adicionado');
});

function removerProjeto(id){
  data.projetos = data.projetos.filter(p=>p.id!==id);
  save(data);
  renderProjetos();
  toast('Projeto removido');
}

// ---- LINKS ----
function renderLinks(){
  const wrap = document.getElementById('lista-links');
  if(data.links.length === 0){
    wrap.innerHTML = '<div class="empty">Nenhum link ainda. Adicione o primeiro acima.</div>';
    return;
  }
  wrap.innerHTML = data.links.slice().reverse().map(l => `
    <div class="item">
      <div class="item-body">
        <div class="item-title">${escapeHtml(l.label)}</div>
        <div class="item-sub"><a href="${escapeAttr(l.url)}" target="_blank" style="color:var(--muted)">${escapeHtml(l.url)}</a></div>
      </div>
      <div class="item-actions">
        <button class="ghost" onclick="removerLink('${l.id}')">Remover</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('form-link').addEventListener('submit', e=>{
  e.preventDefault();
  const label = document.getElementById('l-label').value.trim();
  const url = document.getElementById('l-url').value.trim();
  if(!label || !url) return;
  data.links.push({id: uid(), label, url});
  save(data);
  e.target.reset();
  renderLinks();
  toast('Link adicionado');
});

function removerLink(id){
  data.links = data.links.filter(l=>l.id!==id);
  save(data);
  renderLinks();
  toast('Link removido');
}

// ---- IMPORT/EXPORT ----
document.getElementById('btn-export').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'portfolio-dados.json';
  a.click();
});
document.getElementById('btn-import').addEventListener('click', ()=>{
  document.getElementById('file-import').click();
});
document.getElementById('file-import').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      const imported = JSON.parse(evt.target.result);
      data = {
        projetos: imported.projetos || [],
        links: imported.links || []
      };
      save(data);
      renderProjetos();
      renderLinks();
      toast('Dados importados');
    }catch(err){
      toast('Arquivo inválido');
    }
  };
  reader.readAsText(file);
});

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

renderProjetos();
renderLinks();
</script>
</body>
</html>
