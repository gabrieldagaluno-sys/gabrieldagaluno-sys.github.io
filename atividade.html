<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hero">
  <div class="hero-content">
    <h1 id="titulo"></h1>
    <p class="subtitulo" id="subtitulo"></p>
  </div>
</header>

<main>

  <div class="conteudo">

    <h2>Descrição</h2>
    <p id="descricao"></p>

    <br>

    <a id="classroom" class="voltar" target="_blank">
      Link no Classroom
    </a>

    <br><br>

    <a href="index.html" class="voltar">
      ← Voltar
    </a>

  </div>

</main>

<script>
async function carregar() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  const res = await fetch('atividades.json');
  const data = await res.json();

  const atividade = data.find(a => a.id == id);

  if (!atividade) {
    document.body.innerHTML = "<h1>Atividade não encontrada</h1>";
    return;
  }

  document.getElementById("titulo").innerText = atividade.titulo;
  document.getElementById("subtitulo").innerText = "Atividade " + atividade.numero;
  document.getElementById("descricao").innerText = atividade.descricao;
  document.getElementById("classroom").href = atividade.classroom;
}

carregar();
</script>

</body>
</html>
