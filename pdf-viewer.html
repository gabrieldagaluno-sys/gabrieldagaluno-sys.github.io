<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visualizador de PDF</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    padding:40px;
}


.container{
    max-width:900px;
    margin:auto;
}


h1{
    margin-bottom:30px;
}


.pdf-item{

    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;

}


.pdf-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

}


.pdf-title{

    font-size:20px;
    font-weight:bold;

}



button{

    background:linear-gradient(135deg,#38bdf8,#818cf8);
    border:none;
    color:white;

    padding:10px 20px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

}


button:hover{

    transform:scale(1.05);

}



.pdf-container{

    display:none;

    margin-top:20px;

    background:white;

    border-radius:10px;

    padding:10px;

}


.pdf-container.show{

    display:block;

}


canvas{

    width:100%;

}


.loading{

    color:#64748b;

    text-align:center;

    padding:20px;

}


</style>


</head>


<body>


<div class="container">


<h1>📄 PDFs das Atividades</h1>



<div class="pdf-item">


<div class="pdf-header">


<span class="pdf-title">
Questionário Diagnóstico
</span>


<button onclick="togglePDF(this)">
Ver PDF
</button>


</div>


<div class="pdf-container">


<div class="loading">
Carregando...
</div>


</div>



</div>



</div>





<!-- PDF.JS PRIMEIRO -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>


<script>


pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";



function togglePDF(button){


let container = button.parentElement.nextElementSibling;



if(container.classList.contains("show")){


container.classList.remove("show");

button.innerHTML="Ver PDF";


return;

}



container.classList.add("show");

button.innerHTML="Ocultar PDF";



carregarPDF(container,
"projetos/Questionário%20Diagnóstico%20-%20Algoritmos%20e%20Programação.pdf"
);



}





async function carregarPDF(container, caminho){



if(container.querySelector("canvas")) return;



try{


container.innerHTML="";



const canvas=document.createElement("canvas");


container.appendChild(canvas);



const pdf =
await pdfjsLib.getDocument(caminho).promise;



const pagina =
await pdf.getPage(1);



const escala=1.5;



const viewport =
pagina.getViewport({scale:escala});



canvas.width=viewport.width;

canvas.height=viewport.height;



const contexto =
canvas.getContext("2d");



await pagina.render({

canvasContext:contexto,

viewport:viewport

}).promise;



}

catch(e){


container.innerHTML=

"<p style='color:red'>Erro ao carregar PDF</p>";


console.log(e);


}



}



</script>


</body>
</html>
