<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visualizador de PDF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 30px;
    }

    .pdf-item {
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .pdf-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .pdf-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    button.hide {
      background: #64748b;
    }

    .pdf-container {
      display: none;
      margin-top: 15px;
      border-radius: 8px;
      overflow: hidden;
    }

    .pdf-container.show {
      display: block;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📄 PDFs das Atividades</h1>

  <div class="pdf-item">
    <div class="pdf-header">
      <span class="pdf-title">Questionário Diagnóstico</span>
      <button onclick="togglePDF(this, 'https://raw.githubusercontent.com/gabrieldagaluno-sys/gabrieldagaluno-sys.github.io/refs/heads/main/projetos/Question%C3%A1rio%20Diagn%C3%B3stico%20-%20Algoritmos%20e%20Programa%C3%A7%C3%A3o.pdf')">Ver PDF</button>
    </div>
    <div class="pdf-container"></div>
  </div>

</div>

<script>
function togglePDF(button, pdfUrl) {
  const container = button.nextElementSibling;
  
  if (container.classList.contains('show')) {
    container.classList.remove('show');
    button.textContent = 'Ver PDF';
    button.classList.remove('hide');
  } else {
    container.classList.add('show');
    button.textContent = 'Ocultar PDF';
    button.classList.add('hide');
    
    // Se já tem iframe, não recarrega
    if (!container.querySelector('iframe')) {
      const iframe = document.createElement('iframe');
      iframe.src = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
      container.appendChild(iframe);
    }
  }
}
</script>

</body>
</html>
