<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>
<link rel="stylesheet" href="styles.css">

<style>
.admin-container{
  max-width:700px;
  margin:50px auto;
  background:#111827;
  padding:30px;
  border-radius:20px;
  color:white;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
}
button{
  width:100%;
  padding:15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="admin-container">

<h1>Nova Atividade</h1>

<input id="numero" placeholder="Número">
<input id="titulo" placeholder="Título">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="classroom" placeholder="Link Classroom">

<button onclick="adicionar()">Adicionar</button>

</div>

<script>
async function adicionar() {
  const numero = document.getElementById("numero").value;
  const titulo = document.getElementById("titulo").value;
  const descricao = document.getElementById("descricao").value;
  const classroom = document.getElementById("classroom").value;

  const res = await fetch("atividades.json");
  const data = await res.json();

  const nova = {
    id: Date.now(),
    numero,
    titulo,
    descricao,
    classroom
  };

  data.push(nova);

  // ⚠️ isso NÃO salva no GitHub automaticamente
  console.log(JSON.stringify(data, null, 2));

  alert("Copie o JSON do console e cole no atividades.json");
}
</script>

</body>
</html>
